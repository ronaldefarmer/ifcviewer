<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IFC Viewer</title>

<style>
html, body {
    margin:0;
    height:100%;
    overflow:hidden;
}

#myCanvas {
    width:100%;
    height:100%;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/xeokit-sdk/dist/xeokit-sdk.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xeokit/xeokit-sdk/dist/xeokit-sdk.min.js"></script>

</head>

<body>

<canvas id="myCanvas"></canvas>

<script>

const viewer = new xeokit.Viewer({
    canvasId: "myCanvas",
    transparent: false
});

viewer.camera.eye = [10,10,10];
viewer.camera.look = [0,0,0];
viewer.camera.up = [0,1,0];

const loader = new xeokit.WebIFCLoaderPlugin(viewer, {
    wasmPath: "https://cdn.jsdelivr.net/npm/web-ifc@0.0.46/"
});

loader.load({
    src: "./model.ifc"
});

</script>

</body>
</html>
