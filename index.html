<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IFC Viewer</title>

<style>
body { margin: 0; overflow: hidden; }
#viewer { width: 100vw; height: 100vh; }
</style>

<!-- Load Three.js and WebIFC Viewer from CDN -->
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/web-ifc-viewer@2.0.0/dist/IFCViewerAPI.umd.js"></script>

</head>
<body>
<div id="viewer"></div>

<script>
// Create the viewer
const container = document.getElementById('viewer');
const viewer = new window.IFCViewerAPI({ container });

// Add grid and axes helpers
viewer.grid.setGrid();
viewer.axes.setAxes();

// Set WebAssembly path for WebIFC
viewer.IFC.setWasmPath('https://unpkg.com/web-ifc/');

// Load your IFC model
viewer.IFC.loadIfcUrl('model.ifc').then(() => {
    console.log('IFC model loaded successfully!');
});
</script>

</body>
</html>
