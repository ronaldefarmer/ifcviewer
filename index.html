<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IFC Viewer</title>

<style>
body { margin:0; overflow:hidden; }
#viewer { width:100vw; height:100vh; }
</style>

</head>

<body>

<div id="viewer"></div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.158.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
import { IFCLoader } from "https://unpkg.com/web-ifc-three@0.0.126/IFCLoader.js";

const container = document.getElementById("viewer");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

camera.position.set(8,13,15);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,0);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

const grid = new THREE.GridHelper(50,50);
scene.add(grid);

const loader = new IFCLoader();
loader.ifcManager.setWasmPath("https://unpkg.com/web-ifc@0.0.46/");

loader.load("model.ifc", (model) => {

scene.add(model);

});

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
