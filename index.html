<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>IFC Viewer</title>

<script type="module">
import { IfcViewerAPI } from "https://unpkg.com/web-ifc-viewer/dist/ifc-viewer-api.js";

let viewer;

window.onload = async () => {

const container = document.getElementById("viewer");

viewer = new IfcViewerAPI({ container });

viewer.grid.setGrid();
viewer.axes.setAxes();

viewer.IFC.setWasmPath("https://unpkg.com/web-ifc/");

viewer.IFC.loadIfcUrl("model.ifc");

};
</script>

<style>
body { margin:0; }
#viewer { width:100vw; height:100vh; }
</style>

</head>

<body>

<div id="viewer"></div>

</body>
</html>
