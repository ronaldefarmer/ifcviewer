<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IFC Viewer</title>

<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
</style>

<!-- Load Three.js globally -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<!-- Load IFC loader bundle -->
<script src="https://unpkg.com/web-ifc-three@0.0.125/IFCLoader.js"></script>

</head>

<body>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

camera.position.set(8,13,15);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

// grid
const grid = new THREE.GridHelper(50,50);
scene.add(grid);

// IFC loader
const loader = new IFCLoader();
loader.ifcManager.setWasmPath("https://unpkg.com/web-ifc@0.0.46/");

loader.load("model.ifc", function(model){

scene.add(model);

});

function animate(){

requestAnimationFrame(animate);
renderer.render(scene,camera);

}

animate();

window.addEventListener("resize", ()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
