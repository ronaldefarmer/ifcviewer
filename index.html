<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test IFC Viewer</title>
<style>
body { margin: 0; overflow: hidden; }
#viewer { width: 100vw; height: 100vh; }
</style>

<!-- Load Three.js and WebIFC Viewer (UMD version) -->
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/web-ifc-viewer@2.0.0/dist/IFCViewerAPI.umd.js"></script>

</head>
<body>
<div id="viewer"></div>

<script>
// Create the viewer
const container = document.getElementById('viewer');
const viewer = new window.IFCViewerAPI({ container });

// Add grid and axes
viewer.grid.setGrid();
viewer.axes.setAxes();

// Set WebAssembly path
viewer.IFC.setWasmPath('https://unpkg.com/web-ifc/');

// Load a small built-in example IFC model (cube-like placeholder)
const exampleIfc = 'https://unpkg.com/web-ifc-viewer@2.0.0/examples/ifc/simple.ifc';

viewer.IFC.loadIfcUrl(exampleIfc).then(() => {
    console.log('Test IFC model loaded successfully!');
});
</script>

</body>
</html>
