<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBJ Viewer</title>
<style>
  body { margin: 0; overflow: hidden; }
  #viewer { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="viewer"></div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.156.1/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.156.1/examples/jsm/controls/OrbitControls.js";
import { OBJLoader } from "https://unpkg.com/three@0.156.1/examples/jsm/loaders/OBJLoader.js";

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xdddddd);

// Camera
const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 5, 10);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.update();

// Lights
const light1 = new THREE.DirectionalLight(0xffffff, 1);
light1.position.set(5, 10, 7.5);
scene.add(light1);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// Grid helper
scene.add(new THREE.GridHelper(20, 20));

// Load OBJ
const loader = new OBJLoader();
loader.load(
  "model.obj",
  (object) => { scene.add(object); },
  (xhr) => { console.log((xhr.loaded / xhr.total * 100) + "% loaded"); },
  (err) => { console.error("Error loading OBJ:", err); }
);

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
